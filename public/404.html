<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Brillitos</title>
  <script>
    // GitHub Pages SPA redirect trick
    // Saves the path to sessionStorage then redirects to index.html
    var l = window.location;
    sessionStorage.redirect = l.href;
    l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + l.pathname.split('/').slice(0, 1 + 1).join('/') + '/?p=1');
  </script>
</head>
<body></body>
</html>
